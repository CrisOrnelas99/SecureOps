<section class="auth-grid">
  <div class="auth-card">
    <p class="kicker">Secure access</p>
    <h2>Sign in</h2>
    <p class="muted">Authentication wiring is scheduled for the next roadmap phase.</p>
    <form class="form-stack">
      <div class="field">
        <label for="login-user">Username or email</label>
        <input id="login-user" type="text" autocomplete="username" placeholder="analyst@example.com" />
      </div>
      <div class="field">
        <label for="login-password">Password</label>
        <input id="login-password" type="password" autocomplete="current-password" placeholder="Minimum 8 characters" />
      </div>
      <div class="action-row">
        <button class="btn" type="button">Sign in</button>
        <button class="btn secondary" type="button">Create account</button>
      </div>
    </form>
  </div>

  <aside class="panel diagram-panel" aria-label="Authentication flow preview">
    <span class="diagram-node core">JWT</span>
    <span class="diagram-node one">User</span>
    <span class="diagram-node two">API</span>
    <span class="diagram-node three">BCrypt</span>
    <span class="diagram-node four">Denied</span>
  </aside>
</section>
