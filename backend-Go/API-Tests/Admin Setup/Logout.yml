info:
  name: Logout
  type: http
  seq: 4

http:
  method: POST
  url: http://localhost:8080/api/auth/logout
  auth: inherit
  body:
    type: json
    data: |
      {
        "refreshToken": "{{refreshToken}}"
      }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
